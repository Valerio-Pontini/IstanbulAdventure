<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#111827" />
    <title>Istanbul Adventure</title>
    <meta
      name="description"
      content="Redirect alla versione Angular aggiornata di Istanbul Adventure."
    />
    <style>
      body {
        margin: 0;
        min-height: 100svh;
        display: grid;
        place-items: center;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #0b1220;
        color: #f5efe1;
      }

      .card {
        width: min(560px, calc(100% - 2rem));
        border: 1px solid rgba(212, 162, 74, 0.45);
        border-radius: 14px;
        padding: 1rem 1.1rem;
        background: rgba(12, 19, 30, 0.92);
      }

      p {
        margin: 0;
        line-height: 1.5;
      }

      a {
        color: #f0d6a1;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <p>Caricamento della versione aggiornata in corso...</p>
      <p>
        Se non avviene automaticamente,
        <a id="manual-link" href="./dist/istanbul-adventure/browser/">apri qui</a>.
      </p>
    </div>

    <script>
      (async () => {
        try {
          if ('serviceWorker' in navigator) {
            const registrations = await navigator.serviceWorker.getRegistrations();
            await Promise.all(registrations.map((registration) => registration.unregister()));
          }

          if ('caches' in window) {
            const cacheNames = await caches.keys();
            await Promise.all(cacheNames.map((name) => caches.delete(name)));
          }
        } catch (_) {
          // no-op
        }

        const target = './dist/istanbul-adventure/browser/';
        const version = Date.now().toString();
        const manual = document.getElementById('manual-link');
        if (manual) {
          manual.href = target + '?v=' + version;
        }
        window.location.replace(target + '?v=' + version);
      })();
    </script>
  </body>
</html>
