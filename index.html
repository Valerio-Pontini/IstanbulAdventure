<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#111111" />
  <meta name="description" content="Webapp installabile con copertina fullscreen e seconda pagina con widget SVG e pulsante SVG." />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="assets/icon-192.png" />
  <link rel="apple-touch-icon" href="assets/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cormorant+Garamond:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <title>Webapp Demo</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell">
    <section id="onboardingPage" class="page page-cover is-active" aria-label="Pagina iniziale">
      <button id="enterAppButton" class="cover-tap-area" aria-label="Apri la seconda pagina">
        <img
          class="cover-image"
          src="assets/hero-onboarding.png"
          alt="Immagine di copertina"
        />
        <div class="cover-overlay"></div>
        <h1 class="cover-title" id="coverTitle">Il Mio Titolo</h1>
        <p class="cover-hint" id="coverHint">Tocca per entrare</p>
      </button>
    </section>

    <section id="storyPage" class="page page-content" aria-label="Seconda pagina">
      <div class="content-inner">
        <div class="content-stage">
          <header class="content-header">
            <h2 class="content-title" id="contentTitle">Seconda Pagina</h2>
          </header>

          <div class="widget-wrapper" role="img" aria-label="Textbox decorativa con testo interno">
            <img
              class="widget-frame"
              src="assets/textbox.svg"
              alt=""
              aria-hidden="true"
            />
            <div class="widget-text" id="widgetText">
              Qui va il tuo testo dentro il widget SVG
            </div>
            <div class="widget-controls" aria-label="Navigazione del testo">
              <button id="prevTextButton" class="widget-arrow widget-arrow-prev" type="button" aria-label="Testo precedente">
                <img
                  class="widget-arrow-shape"
                  src="assets/leftArrow.png"
                  alt=""
                  aria-hidden="true"
                />
              </button>
              <button id="nextTextButton" class="widget-arrow widget-arrow-next" type="button" aria-label="Testo successivo">
                <img
                  class="widget-arrow-shape"
                  src="assets/rightArrow.png"
                  alt=""
                  aria-hidden="true"
                />
              </button>
            </div>
          </div>

          <button id="svgActionButton" class="svg-button" type="button">
            <img
              class="svg-button-shape"
              src="assets/pulsante marrone.svg"
              alt=""
              aria-hidden="true"
            />
            <span class="svg-button-label" id="actionButtonLabel">Premi qui</span>
          </button>
        </div>
      </div>
    </section>
  </main>

  <script src="content.js"></script>
  <script src="app.js"></script>
</body>
</html>
