<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#111827" />
    <title>Istanbul Adventure</title>
    <meta name="description" content="Reindirizzamento sicuro alla versione aggiornata di Istanbul Adventure." />
    <style>
      body {
        margin: 0;
        min-height: 100svh;
        display: grid;
        place-items: center;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #0b1220;
        color: #f5efe1;
      }
      .card {
        width: min(560px, calc(100% - 2rem));
        border: 1px solid rgba(212, 162, 74, 0.45);
        border-radius: 14px;
        padding: 1rem 1.1rem;
        background: rgba(12, 19, 30, 0.92);
      }
      p { margin: 0; line-height: 1.5; }
      a { color: #f0d6a1; }
    </style>
  </head>
  <body>
    <div class="card">
      <p>Caricamento della versione aggiornata in corso...</p>
      <p id="status-line">Reindirizzamento automatico in preparazione...</p>
      <p>Se non avviene automaticamente, prova uno di questi link:</p>
      <p>
        <a id="manual-link-primary" href="/IstanbulAdventure/">Apri app</a>
        ·
        <a id="manual-link-secondary" href="/IstanbulAdventure/dist/istanbul-adventure/browser/">Apri build locale</a>
      </p>
    </div>
    <script>
      (async () => {
        const base = '/IstanbulAdventure/';
        const version = Date.now().toString();
        const retryKey = 'istanbulAdventure.redirectAttempt';
        const status = document.getElementById('status-line');
        const candidates = [
          `${base}?v=${version}`,
          `${base}index.html?v=${version}`,
          `${base}dist/istanbul-adventure/browser/?v=${version}`,
          `${base}dist/istanbul-adventure/browser/index.html?v=${version}`
        ];

        const primary = document.getElementById('manual-link-primary');
        const secondary = document.getElementById('manual-link-secondary');
        if (primary) primary.href = candidates[0];
        if (secondary) secondary.href = candidates[2];

        try {
          if ('serviceWorker' in navigator) {
            const regs = await navigator.serviceWorker.getRegistrations();
            await Promise.all(regs.map((r) => r.unregister()));
          }
          if ('caches' in window) {
            const keys = await caches.keys();
            await Promise.all(keys.map((k) => caches.delete(k)));
          }
        } catch (_) {}

        let attempt = Number(sessionStorage.getItem(retryKey) || '0');
        if (!Number.isFinite(attempt) || attempt < 0) {
          attempt = 0;
        }
        const target = candidates[Math.min(attempt, candidates.length - 1)];
        sessionStorage.setItem(retryKey, String(attempt + 1));

        if (status) {
          status.textContent = `Tentativo ${Math.min(attempt + 1, candidates.length)} di ${candidates.length}...`;
        }

        // Stop after the last known target to avoid infinite loops.
        if (attempt >= candidates.length) {
          if (status) {
            status.textContent = 'Reindirizzamento automatico non riuscito: apri uno dei link qui sopra.';
          }
          sessionStorage.removeItem(retryKey);
          return;
        }

        window.location.replace(target);
      })();
    </script>
  </body>
</html>
