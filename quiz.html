<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0d1014" />
  <meta name="description" content="Quiz immersivo di Istanbul Adventure." />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="assets/icon-192.png" />
  <link rel="apple-touch-icon" href="assets/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:opsz,wght@6..96,600;6..96,700&family=Sora:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <title>Istanbul Adventure Quiz</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="quiz-page-body">
  <main class="app-shell">
    <section class="page page-quiz is-active" aria-label="Pagina quiz">
      <div class="quiz-backdrop" aria-hidden="true"></div>
      <div class="story-noise" aria-hidden="true"></div>

      <div class="content-inner">
        <div class="quiz-layout">
          <header class="quiz-header">
            <div class="story-brand">
              <span class="brand-mark">Istanbul Adventure</span>
              <span class="story-route">Quiz Sequence</span>
            </div>
            <div class="story-meta">
              <span class="story-meta-pill">Interactive Challenge</span>
            </div>
          </header>

          <section class="quiz-panel">
            <div id="quizExperience" class="quiz-experience">
              <div class="quiz-widget" role="img" aria-label="Domanda del quiz">
                <div class="quiz-widget-glow" aria-hidden="true"></div>
                <div class="quiz-widget-frame" aria-hidden="true"></div>
                <div class="quiz-widget-text" id="quizQuestionText"></div>
              </div>

              <div id="quizAnswers" class="quiz-answers" aria-live="polite"></div>
            </div>

            <div id="quizCompletion" class="quiz-completion" hidden>
              <div class="quiz-widget quiz-widget-completion" role="img" aria-label="Messaggio finale del quiz">
                <div class="quiz-widget-glow" aria-hidden="true"></div>
                <div class="quiz-widget-frame" aria-hidden="true"></div>
                <div class="quiz-widget-text" id="quizCompletionText"></div>
              </div>
            </div>
          </section>
        </div>
      </div>

      <div id="feedbackOverlay" class="feedback-overlay" hidden role="button" tabindex="0" aria-label="Chiudi il messaggio e continua">
        <div class="feedback-card" role="dialog" aria-modal="true" aria-labelledby="feedbackText">
          <div class="feedback-card-glow" aria-hidden="true"></div>
          <div class="feedback-card-frame" aria-hidden="true"></div>
          <div class="feedback-card-text" id="feedbackText"></div>
          <span class="feedback-card-hint" id="feedbackHint">Tocca per continuare</span>
        </div>
      </div>
    </section>
  </main>

  <script src="content.js"></script>
  <script src="quiz-content.js"></script>
  <script src="quiz.js"></script>
</body>
</html>
