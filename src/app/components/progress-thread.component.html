<div class="progress-thread" [class.progress-thread--compact]="variant === 'compact'">
  @if (label) {
    <div class="progress-thread__meta">
      <span>{{ label }}</span>
    </div>
  }
  <div
    class="progress-thread__steps"
    role="progressbar"
    [attr.aria-label]="label || 'Progress'"
    [attr.aria-valuemin]="1"
    [attr.aria-valuemax]="resolvedTotalSteps"
    [attr.aria-valuenow]="resolvedCurrentStep"
  >
    @for (step of steps; track step) {
      <span
        class="progress-thread__step"
        [class.progress-thread__step--completed]="step < resolvedCurrentStep"
        [class.progress-thread__step--active]="step === resolvedCurrentStep"
        aria-hidden="true"
      ></span>
    }
  </div>
</div>
